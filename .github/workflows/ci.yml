name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: lint · typecheck · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: habitlab
          POSTGRES_PASSWORD: habitlab_ci
          POSTGRES_DB: habitlab_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habitlab -d habitlab_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://habitlab:habitlab_ci@localhost:5432/habitlab_ci
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test_access_secret_do_not_use_in_production
      JWT_REFRESH_SECRET: test_refresh_secret_do_not_use_in_production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
