services:
  postgres:
    image: postgres:16-alpine
    container_name: habitlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: habitlab
      POSTGRES_PASSWORD: habitlab_dev_password
      POSTGRES_DB: habitlab_dev
      # pgcrypto and citext are installed via migration in 001_init_schema.sql
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitlab -d habitlab_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: habitlab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional: a lightweight DB UI. Uncomment to use.
  # Visit http://localhost:8081 after `docker compose up adminer`.
  # adminer:
  #   image: adminer:latest
  #   container_name: habitlab-adminer
  #   restart: unless-stopped
  #   ports:
  #     - "8081:8080"
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
  redis_data:
